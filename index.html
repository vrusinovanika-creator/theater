<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>УКС 2026: Дневник режиссера — визуальная новелла</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1218 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Playfair Display', 'Georgia', serif;
            padding: 20px;
        }

        .visual-novel {
            max-width: 1100px;
            width: 100%;
            background: #0c0a0e;
            border-radius: 40px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.7), 0 0 0 2px rgba(212,175,55,0.3);
            overflow: hidden;
        }

        .illustration-frame {
            background: #050305;
            min-height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            border-bottom: 3px solid #d4af37;
            overflow: hidden;
        }

        .illustration-img {
            max-width: 100%;
            max-height: 450px;
            width: auto;
            height: auto;
            object-fit: contain;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .curtain {
            position: absolute;
            top: 0;
            width: 70px;
            height: 100%;
            background: linear-gradient(90deg, #3b1e24, #1f0f13);
            opacity: 0.5;
            pointer-events: none;
            z-index: 2;
        }
        .curtain-left { left: 0; }
        .curtain-right { right: 0; }

        .novel-panel {
            background: #161015;
            padding: 28px 32px 32px;
            border-top: 1px solid #d4af3760;
        }

        .speaker {
            display: inline-block;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            background: #d4af3720;
            padding: 4px 16px;
            border-radius: 30px;
            color: #e7cfa1;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .dialogue {
            font-size: 1.35rem;
            line-height: 1.5;
            color: #f5ede1;
            background: rgba(0,0,0,0.6);
            padding: 22px 26px;
            border-radius: 28px;
            margin: 12px 0 28px;
            backdrop-filter: blur(4px);
            border-left: 4px solid #d4af37;
            font-weight: 400;
        }

        .choices {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .choice-btn {
            background: linear-gradient(95deg, #2a1e26, #1a1118);
            border: 1px solid #b8944e;
            color: #faeecb;
            font-size: 1rem;
            font-family: inherit;
            padding: 12px 26px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
        }

        .choice-btn:hover {
            background: #4d3340;
            border-color: #e6bf6b;
            transform: scale(1.02);
            box-shadow: 0 0 12px rgba(212,175,55,0.4);
        }

        .next-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 10px;
        }

        .invite-card {
            background: #261e24cc;
            backdrop-filter: blur(12px);
            border-radius: 36px;
            padding: 24px;
            text-align: center;
            border: 2px solid #e2bc6b;
            margin-top: 16px;
        }

        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin: 18px 0;
        }

        .skill-badge {
            background: #d4af3740;
            border-radius: 50px;
            padding: 5px 15px;
            font-size: 0.85rem;
            border: 1px solid #e7bd68;
            color: white;
        }

        .apply-btn {
            background: #b57c1c;
            color: white;
            font-weight: bold;
            padding: 12px 30px;
            border-radius: 50px;
            display: inline-block;
            margin: 12px 0 8px;
            cursor: pointer;
            border: none;
            font-size: 1rem;
            transition: 0.2s;
            text-decoration: none;
        }

        .apply-btn:hover {
            background: #d4af37;
            color: #0a0708;
        }

        .restart-link {
            background: none;
            border: 1px solid #b8944e;
            color: #e7cfa1;
            padding: 6px 20px;
            border-radius: 40px;
            margin-top: 20px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        @media (max-width: 700px) {
            .dialogue { font-size: 1rem; padding: 16px; }
            .novel-panel { padding: 20px; }
            .illustration-frame { min-height: 260px; }
        }
    </style>
</head>
<body>
<div class="visual-novel" id="novelApp">
    <div class="illustration-frame">
        <div class="curtain curtain-left"></div>
        <div class="curtain curtain-right"></div>
        <img id="novelImage" class="illustration-img" src="" alt="сцена театра">
    </div>
    <div class="novel-panel">
        <div class="speaker" id="speakerName">📓 Дневник режиссера</div>
        <div class="dialogue" id="dialogueText">Загрузка сцены...</div>
        <div id="choicesBlock" class="choices"></div>
        <div id="actionBlock" class="next-area"></div>
    </div>
</div>

<script>
    // КАРТИНКИ (замените на свои имена файлов)
    const IMAGES = {
        binocular: "binocular.png",
        directorDesk: "director.png",
        theatreStage: "stage.png",
        assistants: "assistants.png",
        finalScene: "final.png"
    };
    
    // СЦЕНАРИЙ
    const scenes = {
        0: {
            speaker: "🎬 Режиссер УКС",
            text: "«Готовим бинокли! Девятнадцатая конференция УКС превратится в генеральный прогон. Тема года — театр. Я открываю дневник... Мы поставим спектакль про клиентскую поддержку, где синергия — главный герой. Но без команды за кулисами магия не случится.»",
            image: "binocular",
            choices: [
                { text: "Что такое конференция УКС?", nextScene: 1 },
                { text: "Расскажи про театр и синергию", nextScene: 2 }
            ]
        },
        1: {
            speaker: "📜 Дневник режиссера",
            text: "КУКС состоится 29 мая. В этом году мы превращаем конференцию в театр. Зритель не видит, кто поднял занавес, кто подал реквизит — он видит магию целого. Так и в клиентском сервисе: консультант передает запрос экспертам, все отделы работают как единый организм.",
            image: "theatreStage",
            choices: [
                { text: "Кто создает эту магию?", nextScene: 3 }
            ]
        },
        2: {
            speaker: "✨ О синергии",
            text: "Синергия — это когда консультанты бесшумно передают обращение экспертам, а другие отделы меняют инфраструктуру быстрее, чем клиент моргнул. На конференции УКС мы покажем это через театральные приемы. Прямо сейчас я собираю труппу — помощников режиссера.",
            image: "directorDesk",
            choices: [
                { text: "Кого ищем?", nextScene: 3 }
            ]
        },
        3: {
            speaker: "🎭 Приглашаем помощников режиссера",
            text: "Нам нужны те, кто умеет:\n• Писать статьи на Стаффе\n• Работать в Фигме\n• Снимать ролики или играть на сцене\n• Вайбкодить / кодить\n• Имеет театральный опыт\n• Делать дизайн презентаций\n• Помогать офлайн на конференции\n• Создавать грим / аквагрим",
            image: "assistants",
            choices: [
                { text: "Творческое задание?", nextScene: 4 },
                { text: "Хочу придумать сцену!", nextScene: 4 }
            ]
        },
        4: {
            speaker: "Творческое задание",
            text: "Придумайте одну «сцену» (интерактив, активность, зону) для конференции УКС 2026. Условия: обыгрывает театр и синергию, вовлекает зрителей, мало ресурсов, реализуема онлайн или офлайн.",
            image: "theatreStage",
            choices: [
                { text: "Я готов стать помощником режиссера!", nextScene: 5 },
                { text: "Где подать заявку?", nextScene: 5 }
            ]
        },
        5: {
            speaker: "Финал — твой выход!",
            text: "Потрясающе! Ты чувствуешь театр. Конференция УКС 2026 состоится 29 мая, и мы ждем именно тебя — за кулисами или в зале. Заполни анкету, пришли свою «сцену» и стань соавтором яркого события!",
            image: "finalScene",
            choices: []
        }
    };
    
    let currentSceneId = 0;
    
    const imgEl = document.getElementById('novelImage');
    const speakerEl = document.getElementById('speakerName');
    const dialogueEl = document.getElementById('dialogueText');
    const choicesBlock = document.getElementById('choicesBlock');
    const actionBlock = document.getElementById('actionBlock');
    
    function setImage(imgKey) {
        let url = IMAGES[imgKey];
        if (!url) {
            url = "https://placehold.co/1100x500/2a1a22/d4af37?text=Изображение+не+найдено";
        }
        imgEl.src = url;
        imgEl.alt = "Иллюстрация: " + imgKey;
    }
    
    function renderScene(sceneId) {
        const scene = scenes[sceneId];
        if (!scene) return;
        
        speakerEl.innerText = scene.speaker;
        dialogueEl.innerHTML = scene.text.replace(/\n/g, '<br>');
        setImage(scene.image);
        
        choicesBlock.innerHTML = '';
        actionBlock.innerHTML = '';
        
        if (scene.choices && scene.choices.length > 0) {
            // Есть выбор — показываем кнопки
            scene.choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerText = choice.text;
                btn.onclick = () => {
                    currentSceneId = choice.nextScene;
                    renderScene(currentSceneId);
                };
                choicesBlock.appendChild(btn);
            });
        } else {
            // Финальная сцена — показываем анкету
            const inviteDiv = document.createElement('div');
            inviteDiv.className = 'invite-card';
            inviteDiv.style.display = 'flex';
            inviteDiv.style.flexDirection = 'row';
            inviteDiv.style.justifyContent = 'space-between';
            inviteDiv.style.alignItems = 'center';
            inviteDiv.style.flexWrap = 'wrap';
            inviteDiv.style.gap = '20px';
            inviteDiv.style.backgroundColor = 'rgba(0,0,0,0.7)';
            
            inviteDiv.innerHTML = `
                <div style="flex: 1; min-width: 250px;">
                    <button id="assistantBtn" style="
                        background: linear-gradient(135deg, #8b691b, #5c4512);
                        color: white;
                        font-size: 1rem;
                        font-weight: bold;
                        padding: 18px 20px;
                        border-radius: 60px;
                        border: none;
                        cursor: pointer;
                        width: 100%;
                        font-family: inherit;
                    ">
                        🎭 СТАТЬ ПОМОЩНИКОМ РЕЖИССЕРА НА КУКС 2026
                    </button>
                </div>
                <div style="flex: 2; min-width: 260px;">
                    <div style="font-size:1.7rem; color:white;">🎭 КУКС 2026 🎭</div>
                    <div style="color:white;">Стань помощником режиссера и войди в закулисье конференции!</div>
                    <div class="skills">
                        <span class="skill-badge">✍️ Стафф</span>
                        <span class="skill-badge">🎨 Фигма</span>
                        <span class="skill-badge">🎬 Видео/Актер</span>
                        <span class="skill-badge">💻 Вайбкодинг</span>
                        <span class="skill-badge">🎭 Театр</span>
                        <span class="skill-badge">✨ Грим</span>
                    </div>
                    <a href="https://staff.skbkontur.ru/survey/69df26ff76480cd7d9c0e088" target="_blank" class="apply-btn">
                        📝 СТАТЬ ПОМОЩНИКОМ
                    </a>
                </div>
            `;
            actionBlock.appendChild(inviteDiv);
            
            const assistantBtn = document.getElementById('assistantBtn');
            if (assistantBtn) {
                assistantBtn.onclick = () => {
                    window.open('https://staff.skbkontur.ru/survey/69df26ff76480cd7d9c0e088', '_blank');
                };
            }
            
            const restartBtn = document.createElement('button');
            restartBtn.className = 'restart-link';
            restartBtn.innerText = '🎭 Сначала / Перечитать дневник режиссера';
            restartBtn.onclick = () => {
                currentSceneId = 0;
                renderScene(0);
            };
            actionBlock.appendChild(restartBtn);
        }
    }
    
    // Запуск игры
    renderScene(0);
</script>
</body>
</html>
