<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>УКС 2026: Дневник режиссёра | Театр клиентского сервиса</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* для атмосферы "книги" */
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0708 0%, #1a1217 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Playfair Display', 'Georgia', 'Times New Roman', serif;
            padding: 20px;
        }

        /* дорогой контейнер */
        .game-container {
            max-width: 800px;
            width: 100%;
            background: #1e171c;
            border-radius: 48px 24px 48px 24px;
            box-shadow: 0 30px 40px rgba(0,0,0,0.6), inset 0 1px 2px rgba(255,255,255,0.08);
            overflow: hidden;
            transition: all 0.2s ease;
            border: 1px solid rgba(218, 165, 32, 0.3);
        }

        /* иллюстрация (премиум-стиль) */
        .art-stage {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background-size: cover;
            background-position: center 30%;
            background-repeat: no-repeat;
            transition: background-image 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: inset 0 -20px 30px -10px rgba(0,0,0,0.6);
        }

        .art-stage::after {
            content: "🎭";
            position: absolute;
            bottom: 12px;
            right: 16px;
            font-size: 28px;
            opacity: 0.7;
            text-shadow: 0 2px 5px black;
            pointer-events: none;
        }

        /* текстовая область — как страницы дневника */
        .diary-paper {
            background: #fef7e6;
            background-image: repeating-linear-gradient(transparent, transparent 31px, rgba(0,0,0,0.03) 31px, rgba(0,0,0,0.04) 32px);
            padding: 28px 26px;
            border-radius: 32px 16px 32px 16px;
            margin: 20px 22px 22px 22px;
            box-shadow: inset 0 0 0 1px #fff8, 0 10px 20px rgba(0,0,0,0.2);
            font-family: 'Courier New', 'Playfair Display', monospace;
        }

        .dialogue-text {
            font-size: 1.2rem;
            line-height: 1.5;
            color: #2c241a;
            font-weight: 500;
            min-height: 140px;
            margin-bottom: 20px;
            font-family: 'Playfair Display', serif;
            letter-spacing: 0.01em;
        }

        .signature {
            text-align: right;
            font-style: italic;
            font-size: 0.9rem;
            color: #b47c44;
            margin-top: 10px;
            border-top: 1px dashed #e4d5b6;
            padding-top: 12px;
            font-family: monospace;
        }

        .btn-next {
            background: linear-gradient(135deg, #1f1519 0%, #2f2228 100%);
            border: none;
            width: 100%;
            padding: 16px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #ecd9b4;
            font-family: 'Playfair Display', serif;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
            border-radius: 60px;
            box-shadow: 0 5px 0 #0a0708;
            text-transform: uppercase;
        }

        .btn-next:hover {
            background: linear-gradient(135deg, #2e2027, #3f2e36);
            color: #ffecb3;
            transform: translateY(-2px);
            box-shadow: 0 7px 0 #0a0708;
        }

        .btn-next:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #0a0708;
        }

        /* список ролей — изысканно */
        .role-list {
            background: #2e2329b3;
            backdrop-filter: blur(4px);
            margin: 15px 0;
            padding: 14px 18px;
            border-radius: 28px;
            color: #faeec7;
            font-size: 0.85rem;
            font-family: monospace;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .role-badge {
            background: #00000066;
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            border-left: 2px solid gold;
        }

        .creative-task {
            background: #dac48e20;
            border-left: 5px solid #e4b363;
            padding: 12px 16px;
            margin: 16px 0;
            font-style: italic;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .footer-annotation {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 12px;
            color: #ab8e54;
        }

        @media (max-width: 550px) {
            .diary-paper {
                margin: 12px;
                padding: 20px;
            }
            .dialogue-text {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="art-stage" id="artStage"></div>
    <div class="diary-paper">
        <div class="dialogue-text" id="dialogueText">
            <!-- Текст будет меняться -->
        </div>
        <div class="signature">Режиссёр УКС · театральный дневник</div>
        <button class="btn-next" id="nextBtn">➤ ЛИСТАТЬ ДАЛЕЕ</button>
        <div class="footer-annotation">🎭 XIX конференция «Клиентский сервис как театр синергии»</div>
    </div>
</div>

<script>
    // ----- СЦЕНЫ (главы дневника режиссёра) -----
    const scenes = [
        {
            img: "https://i.imgur.com/RJvFc3b_d.webp?maxwidth=800&fidelity=grand",  // театральный занавес, бинокль
            fallbackImg: "https://placehold.co/800x450/2c1e24/d4af7a?text=Театр+УКС",
            text: "📓 Дневник режиссёра. Страница первая. \n\n«Готовим бинокли! Девятнадцатая конференция УКС превратится в генеральный прогон. Тема этого года — театр. Я сижу в пустом зале и слышу, как скрипят половицы сцены. За кулисами — тишина, но именно здесь рождается буря аплодисментов».<br><br>Спектакль про клиентскую поддержку? О, это будет нечто. Без синергии друг с другом и команды за кулисами даже самая громкая премьера не состоится."
        },
        {
            img: "https://i.imgur.com/08bqGYr_d.webp?maxwidth=800&fidelity=grand",
            fallbackImg: "https://placehold.co/800x450/342128/c9a87b?text=Сценарий+синергии",
            text: "«В театре зритель не знает, кто поднял занавес, кто вовремя подал реквизит или как осветитель успел сменить луч — он видит магию целого. Также и в клиентском сервисе. Синергия — это когда поддержка бесшумно передает обращение экспертам, а другие отделы меняют инфраструктуру быстрее, чем клиент моргнул».<br><br>29 мая. Гибридный формат. Офлайн и онлайн — два крыла одной сцены."
        },
        {
            img: "https://i.imgur.com/ntPIGbF_d.webp?maxwidth=800&fidelity=grand",
            fallbackImg: "https://placehold.co/800x450/3f2b2e/dbbc87?text=Помощники+режиссёра",
            text: "🎭 Пока я пишу сценарий, настраиваю свет и готовлю форматы — мне нужны СОЗДАТЕЛИ. Те, кто окажется за кулисами конференции. Помощники режиссёров. Без вас магия невозможна.<br><br>Я ищу людей с искрами в глазах, умеющих:",
            special: "roleList"
        },
        {
            img: "https://i.imgur.com/dY6LFKb_d.webp?maxwidth=800&fidelity=grand",
            fallbackImg: "https://placehold.co/800x450/503a3a/d6a45c?text=Творческое+задание",
            text: "✨ ТЕАТР ТРЕБУЕТ ОТДАЧИ ✨<br><br>Помимо скиллов и желания, я жду от будущих помощников выполненное творческое задание:<br><br>«Придумай одну СЦЕНУ (интерактив, зону, активность, локацию), которая станет частью конференции УКС 2026».",
            special: "creative"
        },
        {
            img: "https://i.imgur.com/BQ2O6Kb_d.webp?maxwidth=800&fidelity=grand",
            fallbackImg: "https://placehold.co/800x450/39282b/e7bd7c?text=Условия+сцены",
            text: "📜 Условия твоей сцены:<br>✔ Может быть офлайн или онлайн.<br>✔ Обыгрывает темы ТЕАТР и СИНЕРГИЯ.<br>✔ Вовлекает зрителей (они — актёры!).<br>✔ Минимум ресурсов, максимум магии.<br><br>Например: „Закулисный квест“ или „Импровизация с залом через чат“. Придумай смело!",
            special: null
        },
        {
            img: "https://i.imgur.com/tcbB6gS_d.webp?maxwidth=800&fidelity=grand",
            fallbackImg: "https://placehold.co/800x450/281c1f/e2b56a?text=Анкета+помощника",
            text: "🎭 ИТОГ: Стань частью тех, кто создаст яркое событие. Неважно, где ты будешь — в зале или за экраном. Если ты любишь создавать события — мы ждём тебя.<br><br>👇 Заполни анкету помощника режиссёра УКС 2026. Присылай свои скиллы и идею сцены. Бинокли заряжены!",
            special: "finalButton"
        }
    ];

    let currentScene = 0;

    // Элементы
    const artDiv = document.getElementById('artStage');
    const dialogueDiv = document.getElementById('dialogueText');
    const nextBtn = document.getElementById('nextBtn');

    // Функция загрузки изображения с fallback
    function setImage(imgUrl, fallbackUrl) {
        const testImg = new Image();
        testImg.onload = () => { artDiv.style.backgroundImage = `url('${imgUrl}')`; };
        testImg.onerror = () => { artDiv.style.backgroundImage = `url('${fallbackUrl}')`; };
        testImg.src = imgUrl;
        // для мгновенного отклика показываем fallback, потом заменится
        artDiv.style.backgroundImage = `url('${fallbackUrl}')`;
    }

    function renderScene(index) {
        const scene = scenes[index];
        if (!scene) return;

        // установка изображения
        setImage(scene.img, scene.fallbackImg);
        
        // базовый текст
        let finalHtml = scene.text.replace(/\n/g, '<br>');
        
        // Добавляем специальные блоки
        if (scene.special === 'roleList') {
            finalHtml += `<div class="role-list">
                            <span class="role-badge">✍️ Писать статьи/заметки на Стаффе</span>
                            <span class="role-badge">🎨 Работать в Фигме</span>
                            <span class="role-badge">🎬 Снять ролик / быть актёром</span>
                            <span class="role-badge">💻 Вайбкодить / кодить</span>
                            <span class="role-badge">🎭 Опыт в театре</span>
                            <span class="role-badge">📊 Дизайн презентаций</span>
                            <span class="role-badge">🏟️ Помощь офлайн на конфе</span>
                            <span class="role-badge">💄 Макияж, грим, аквагрим</span>
                         </div>`;
        }
        
        if (scene.special === 'creative') {
            finalHtml += `<div class="creative-task">
                            🎭 <strong>Пример интерактива:</strong> «Театр теней поддержки» — зрители голосуют, как осветить скрытую проблему клиента. Или «Синергия-экспромт»: онлайн-зрители управляют движениями актёров через чат. Твоя идея — уникальна!
                         </div>`;
        }
        
        if (scene.special === 'finalButton') {
            // ничего лишнего, просто покажем кнопку анкеты внутри текста? 
            // Сделаем так, чтобы после текста кнопка-ссылка. Но основная кнопка next заменится?
            finalHtml += `<div style="margin-top: 20px; text-align: center;">
                            <a href="https://example.com/uks2026-assistant-form" target="_blank" style="background: #b48c48; color: #1e171c; padding: 12px 20px; border-radius: 40px; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 6px; font-family: monospace;">🎭 СТАТЬ ПОМОЩНИКОМ РЕЖИССЁРОВ 🎭</a>
                          </div>`;
        }
        
        dialogueDiv.innerHTML = finalHtml;
        
        // Меняем текст кнопки на последней сцене
        if (index === scenes.length - 1) {
            nextBtn.textContent = "★ ВЕРНУТЬСЯ К НАЧАЛУ ДНЕВНИКА ★";
        } else {
            nextBtn.textContent = "➤ ЛИСТАТЬ ДАЛЕЕ";
        }
    }

    function nextScene() {
        if (currentScene + 1 < scenes.length) {
            currentScene++;
            renderScene(currentScene);
        } else {
            // зацикливаем на первый кадр (дневник начинается заново)
            currentScene = 0;
            renderScene(currentScene);
        }
    }

    // начальная отрисовка
    renderScene(0);

    // обработчик клика
    nextBtn.addEventListener('click', nextScene);

    // добавим атмосферный бинокль при наведении
    document.querySelector('.game-container').addEventListener('mousemove', (e) => {
        let x = e.clientX / window.innerWidth;
        let y = e.clientY / window.innerHeight;
        artDiv.style.transition = "transform 0.1s ease";
        artDiv.style.transform = `scale(1.01) translate(${x * 2 - 1}px, ${y * 2 - 1}px)`;
    });
    document.querySelector('.game-container').addEventListener('mouseleave', () => {
        artDiv.style.transform = "scale(1) translate(0,0)";
    });
</script>
</body>
</html>
